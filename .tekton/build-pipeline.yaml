apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-npm
spec:
  description: |
    npm Trusted Libraries onboarding — PR build pipeline.
    Lints changed manifests, identifies packages, runs the factory, pushes
    built tarballs as an OCI artifact to Quay (mirrors Python index).
  params:
    - name: git-url
      type: string
    - name: revision
      type: string
      default: ""
    - name: output-image
      description: Quay repository prefix; npm packages land at $(output-image).npm
      type: string
    - name: image-expires-after
      type: string
      default: ""
    - name: prev-packages-ref
      type: string
    - name: git-clone-depth
      type: string
      default: "0"
    - name: builder-image
      description: Pinned npm-builder image (lint scripts + BUILDER_IMAGE via SCRIPT_RUNNER_IMAGE_REFERENCE)
      type: string
    - name: task-build-npm-package-bundle
      description: Tekton bundle image for build-npm-package-oci-ta
      type: string
    - name: publish-to-pulp
      description: When true, also npm publish to Pulp Stage (future; requires stage secret)
      type: string
      default: "false"
    - name: pulp-npm-registry-url
      description: Pulp Stage npm registry URL (only when publish-to-pulp is true)
      type: string
      default: ""
    - name: npm-publish-secret-name
      type: string
      default: rhtl-pulp-npm-stage-credentials
    - name: skip-checks
      type: string
      default: "false"
    - name: rebuild
      type: string
      default: "false"
  results:
    - name: IMAGE_URL
      value: $(tasks.build-npm-package.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-npm-package.results.IMAGE_DIGEST)
    - name: CHAINS-GIT_URL
      value: $(tasks.clone-repository.results.url)
    - name: CHAINS-GIT_COMMIT
      value: $(tasks.clone-repository.results.commit)
  tasks:
    - name: init
      params:
        - name: image-url
          value: $(params.output-image)
        - name: rebuild
          value: $(params.rebuild)
        - name: skip-checks
          value: $(params.skip-checks)
      taskRef:
        resolver: bundles
        params:
          - name: name
            value: init
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-init:0.4@sha256:5a423246792ac501ea279229b42ee57da9927da441c04b5c9ff86817b0856b08
          - name: kind
            value: task
    - name: clone-repository
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.revision)
        - name: fetchTags
          value: "true"
        - name: depth
          value: $(params.git-clone-depth)
        - name: ociStorage
          value: $(params.output-image).git
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
      taskRef:
        resolver: bundles
        params:
          - name: name
            value: git-clone-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.2@sha256:e5ba1f8549e6a0f043629ef00bea7511957121e05304b688f40ff12304560f38
          - name: kind
            value: task
      workspaces:
        - name: basic-auth
          workspace: git-auth
    - name: lint-manifests
      params:
        - name: SOURCE_ARTIFACT
          value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
        - name: SCRIPT
          value: |
            ./hack/lint-manifest.sh '$(params.prev-packages-ref)'
        - name: SCRIPT_RUNNER_IMAGE
          value: $(params.builder-image)
        - name: HERMETIC
          value: "true"
        - name: ociStorage
          value: $(params.output-image).lint
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
      taskRef:
        resolver: bundles
        params:
          - name: name
            value: run-script-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-run-script-oci-ta:0.1@sha256:7fbaddc523c3a9dab583b0ed8508fa413cf27c0e725de5e5c8207bb33a0f519a
          - name: kind
            value: task
    - name: identify-packages
      params:
        - name: SOURCE_ARTIFACT
          value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
        - name: SCRIPT
          value: |
            ./hack/identify-packages '$(params.prev-packages-ref)' "${SCRIPT_OUTPUT_ARRAY}" "${SCRIPT_OUTPUT}"
        - name: SCRIPT_RUNNER_IMAGE
          value: $(params.builder-image)
        - name: HERMETIC
          value: "true"
        - name: ociStorage
          value: $(params.output-image).pkgs
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
      taskRef:
        resolver: bundles
        params:
          - name: name
            value: run-script-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-run-script-oci-ta:0.1@sha256:7fbaddc523c3a9dab583b0ed8508fa413cf27c0e725de5e5c8207bb33a0f519a
          - name: kind
            value: task
    - name: build-npm-package
      runAfter:
        - lint-manifests
        - identify-packages
      params:
        - name: PACKAGES
          value: $(tasks.identify-packages.results.SCRIPT_OUTPUT_ARRAY)
        - name: SOURCE_ARTIFACT
          value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
        - name: BUILDER_IMAGE
          value: $(tasks.lint-manifests.results.SCRIPT_RUNNER_IMAGE_REFERENCE)
        - name: IMAGE
          value: $(params.output-image).npm
        - name: IMAGE_EXPIRES_AFTER
          value: $(params.image-expires-after)
        - name: PULP_NPM_REGISTRY_URL
          value: $(params.pulp-npm-registry-url)
        - name: NPM_PUBLISH_SECRET_NAME
          value: $(params.npm-publish-secret-name)
        - name: PUBLISH_TO_PULP
          value: $(params.publish-to-pulp)
      taskRef:
        resolver: bundles
        params:
          - name: name
            value: build-npm-package-oci-ta
          - name: bundle
            value: $(params.task-build-npm-package-bundle)
          - name: kind
            value: task
  workspaces:
    - name: git-auth
      optional: true
